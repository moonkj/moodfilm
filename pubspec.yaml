name: moodfilm
description: Like it! - 감성 필터 카메라 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 상태관리
  flutter_riverpod: ^2.6.1

  # 라우팅
  go_router: ^14.6.3

  # 로컬 저장
  hive_flutter: ^1.1.0

  # 인앱결제
  purchases_flutter: ^8.7.0

  # Firebase
  firebase_core: ^3.12.1
  firebase_analytics: ^11.4.5
  firebase_crashlytics: ^4.3.5

  # 이미지/갤러리
  photo_manager: ^3.6.3
  share_plus: ^10.1.4
  google_fonts: ^6.2.1
  video_player: ^2.9.2

  # 유틸
  path_provider: ^2.1.5
  permission_handler: ^11.4.0
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1

  cupertino_icons: ^1.0.8

  # 다국어 지원
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/luts/
    - assets/thumbnails/
    - assets/images/
    # - assets/textures/    # v1.1에서 추가

  # fonts:  # Pretendard 파일 추가 후 활성화
  #   - family: Pretendard
  #     fonts:
  #       - asset: assets/fonts/Pretendard-Regular.otf
  #         weight: 400
  #       - asset: assets/fonts/Pretendard-Medium.otf
  #         weight: 500
  #       - asset: assets/fonts/Pretendard-SemiBold.otf
  #         weight: 600
  #       - asset: assets/fonts/Pretendard-Bold.otf
  #         weight: 700
